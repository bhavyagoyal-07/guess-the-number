<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Number Guessing Game</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background-color:#2b2b2b;
    font-family:Arial, Helvetica, sans-serif;

    display:flex;
    justify-content:center;
    align-items:center;

    height:100vh;
}

.container{
    width:800px;
    background-color:#4a4a4a;
    color:white;

    padding:40px;
}


.heading{
    background-color:#2f2f2f;
    padding:10px 15px;
    margin-bottom:30px;
}

.heading h1{
    font-size:50px;
}


.info{
    font-size:28px;
    margin-bottom:25px;
}


.guess-box{
    text-align:center;
    margin-top:50px;
}

.guess-box h2{
    font-size:90px;
    font-weight:normal;

    margin-bottom:40px;
}

.guess-box input{
    width:500px;
    height:70px;

    font-size:30px;

    border:6px solid #d3d3d3;

    margin-bottom:50px;
}


.guess-box button{
    width:300px;
    height:80px;

    border:none;
    border-radius:20px;

    background:black;
    color:white;

    font-size:35px;
    font-weight:bold;

    cursor:pointer;

    margin-bottom:40px;
}


.result{
    font-size:30px;
    margin-bottom:20px;
}

.box{
    display:inline-block;

    width:25px;
    height:45px;

    background:white;

    vertical-align:middle;
}

</style>
</head>

<body>

<div class="container">

    <div class="heading">
        <h1>Number guessing game</h1>
    </div>

    <p class="info">
        Try and guess a random number between 1 and 100.
    </p>

    <p class="info">
        You have 10 attempts to guess the right number.
    </p>
    <form>
    <div class="guess-box">

        <h2 class="guessField" id="guess">Guess a number</h2>

        <input type="text" class="guessField" id="guessField">

        <br>

        <button type="submit" id="subt" value="Submit guess" class="guessSubmit">
            Submit guess
        </button>
        <div class="resultParas">
        <p class="result">
            Previous Guesses:
            <span class="guesses"></span>
        </p>

        <p class="lastResult">
            Guesses Remaining: 10
        </p>
        <p class="lowOrHi"></p>
        </div>
        </form>

    </div>

</div>

</body>
<script>
    let randomNumber = parseInt(Math.random()*100+1)
    const submit = document.querySelector('#subt')
    const userInput = document.querySelector('#guessField')
    const guessSlot = document.querySelector('.guesses')
    const remaining = document.querySelector('.lastResult')
    const lowOrHi = document.querySelector('.lowOrHi')
    const startOver = document.querySelector('.resultParas')

   const p = document.createElement('p')

   let prevGuess = []
   let numGuess = 1

   let playGame = true

   if(playGame){
        submit.addEventListener('click',function(e){
        e.preventDefault()
        const guess =  parseInt(userInput.value)
        validateGuess(guess)
    });
   }

   function validateGuess(guess){
    if(isNaN(guess)){
        alert('Please enter a valid number')
    }
    else if(guess < 1){
        alert('Please enter a valid number')
    }
    else if(guess > 100){
        alert('Please enter a valid number')
    }
    else{
        prevGuess.push(guess)
        if(numGuess === 11){
            displayGuess(guess)
            displayMessage(`Game Over.Random Number was ${randomNumber}`)
            endGame()
        }
        else{
            displayGuess(guess)
            checkGuess(guess)
        }
    }

   }

   function checkGuess(guess){
    if(guess === randomNumber){
        displayMessage(`You guessed it right`)
        endGame()
    }
    else if(guess < randomNumber){
        displayMessage(`Your number is small`)
    }
     else if(guess > randomNumber){
        displayMessage(`Your number is high`)
    }

   }

   function displayGuess(guess){
    userInput.value = ''
    guessSlot.innerHTML += `${guess}  `
    numGuess++
    remaining.innerHTML = `${11-numGuess}`
   }
   function displayMessage(message){
    lowOrHi.innerHTML = `<h2>${message}</h2>`

   }
   function endGame(guess){
    userInput.value = ''
    userInput.setAttribute('disabled', '')
    p.classList.add('button')
    p.innerHTML = `<h2 id="newGame">Start new game</h2>`
    startOver.appendChild(p)
    playGame = false
    newGame()
   }

   function newGame(guess){
    const newGameButton = document.querySelector('#newGame')
    newGameButton.addEventListener('click',function(e){
        randomNumber = parseInt(Math.random()*100+1)
        prevGuess = []
        numGuess = 1
        guessSlot.innerHTML = ''
        remaining.innerHTML = `${11-numGuess}`
        userInput.removeAttribute('disabled')
        startOver.removeChild(p)
        playGame = true
    });
   }
  </script>
</html>
