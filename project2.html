<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
 *{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    background:#f5f5f5;
}

/* NAVBAR */

nav{
    width:100%;
    height:70px;

    background:white;

    display:flex;
    justify-content:center;
    align-items:center;
    gap:20px;

    border-bottom:1px solid #ccc;
}

.nav-btn{
    padding:10px 25px;
    font-size:16px;

    border:2px solid #999;
    background:white;

    border-radius:5px;

    cursor:pointer;
}

/* MAIN CONTAINER */

.container{
    width:500px;
    min-height:500px;

    background:#7d7d7d;

    margin:30px auto;

    padding:40px;
}

h2{
    font-size:40px;
    margin-bottom:40px;
}

label{
    font-size:22px;
}

input{
    width:220px;
    height:35px;

    margin:15px 0 30px;

    padding-left:10px;

    font-size:16px;
}

.btn{
    padding:10px 25px;

    font-size:18px;

    border:2px solid #666;
    border-radius:8px;

    cursor:pointer;

    margin-bottom:30px;
}

.guide h2{
    font-size:32px;
    margin-bottom:20px;
}

.guide p{
    font-size:22px;
    margin-bottom:15px;
}

.results{
    font-size:28px;
    margin:20px 0;
}

</style>
<body>
    <body>

    <nav>
        <button class="nav-btn">Home</button>
        <button class="nav-btn">Youtube channel</button>
    </nav>

    <div class="container">

        <h2>BMI Calculator</h2>

        <form>

            <label>Height in CM:</label><br>
            <input type="text" class="height"><br><br>

            <label>Weight in KG:</label><br>
            <input type="text" class="weight"><br><br>

            <button class="btn">Calculate</button>

            <div class="results"></div>

        </form>

        <div class="guide">

            <h2>BMI Weight Guide</h2>

            <p>Under Weight = Less than 18.6</p>
            <p>Normal Range = 18.6 and 24.9</p>
            <p>Overweight = Greater than 24.9</p>

        </div>

    </div>

</body>
    <script>
       const form = document.querySelector('form')//selecting whole because it contains the result
        form.addEventListener('submit',function(e) {
          e.preventDefault()//because after submit the values goes into the server
           const height = parseInt(document.querySelector('.height').value)
           const weight = parseInt(document.querySelector('.weight').value)
           const results = document.querySelector('.results')
           
           if(height < 0 || isNaN(height)){
            results.innerHTML = `Please give a valid height ${height}`
           }
           else if(weight < 0 || isNaN(weight)){
            results.innerHTML = `Please give a valid height ${weight}`
           }
           else{
            const bmi = (weight / ((height * height) / 10000))
            if(bmi < 18.6){
              results.innerHTML = 
              `<span>${bmi}</span><br>
              <span>You are Underweight</span>`
            }
            else if(bmi > 18.6 && bmi < 24.9){
              results.innerHTML = 
              `<span>${bmi}</span><br>
              <span>You are Underweight</span>`
            }
             else{
              results.innerHTML = 
              `<span>${bmi}</span><br>
              <span>You are Overweight</span>`
            }
           }
        });

    </script>
</body>
</html>
